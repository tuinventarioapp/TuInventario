server:
  port: ${PORT:8080}

spring:
  application:
    name: tuinventario-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tuinventario}
    username: ${DB_USER:tuinventario}
    password: ${DB_PASSWORD:tuinventario}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  env: ${APP_ENV:local}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  access-token-minutes: 30
  refresh-token-days: 14
  jwt-access-secret: ${JWT_ACCESS_SECRET:tuinventario-access-secret-change-me}
  jwt-refresh-secret: ${JWT_REFRESH_SECRET:tuinventario-refresh-secret-change-me}
  demo-seed-enabled: ${APP_DEMO_SEED_ENABLED:}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  mail-from: ${MAIL_FROM:no-reply@tuinventario.local}
  mail-from-name: ${MAIL_FROM_NAME:TuInventario}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
