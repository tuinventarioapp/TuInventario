server:
  port: 8080

spring:
  application:
    name: tuinventario-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tuinventario}
    username: ${DB_USER:tuinventario}
    password: ${DB_PASSWORD:tuinventario}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  access-token-minutes: 30
  refresh-token-days: 14
  jwt-access-secret: ${JWT_ACCESS_SECRET:tuinventario-access-secret-change-me}
  jwt-refresh-secret: ${JWT_REFRESH_SECRET:tuinventario-refresh-secret-change-me}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
