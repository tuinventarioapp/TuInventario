spring:
  datasource:
    url: jdbc:h2:mem:tuinventario;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  jwt-access-secret: test-access-secret-test-access-secret
  jwt-refresh-secret: test-refresh-secret-test-refresh-secret
  access-token-minutes: 30
  refresh-token-days: 14
  frontend-origin: http://localhost:5173
