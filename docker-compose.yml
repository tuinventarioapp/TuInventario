services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tuinventario}
      POSTGRES_USER: ${DB_USER:-tuinventario}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tuinventario}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tuinventario} -d ${DB_NAME:-tuinventario}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEMO_SEED_ENABLED: ${APP_DEMO_SEED_ENABLED:-true}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-tuinventario}
      DB_USER: ${DB_USER:-tuinventario}
      DB_PASSWORD: ${DB_PASSWORD:-tuinventario}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-tuinventario-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-tuinventario-refresh-secret-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@tuinventario.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TuInventario}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
        VITE_APP_NAME: ${VITE_APP_NAME:-TuInventario}
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:
